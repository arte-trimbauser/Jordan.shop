<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jordan Shop | Painel Staff</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script>
        const utilizadorLogado = sessionStorage.getItem('staff_sessao') || "Staff";

        if (!sessionStorage.getItem('staff_sessao') && !window.location.search.includes('user')) {
            alert("⚠️ Sessão Inválida!");
            window.location.href = "login.html";
        }

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('nav-username').innerText = utilizadorLogado;
            fetchLogs();
        });
    </script>

    <style>
        :root {
            --primary-red: #8b0000; 
            --overlay-dark: rgba(0, 0, 0, 0.8);
        }

        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Open Sans', sans-serif; color: white; overflow: hidden; }
        
        /* FUNDO FIXO */
        .bg-full { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: url('menu.png') no-repeat center center; 
            background-size: cover; z-index:-2; filter: brightness(0.4); 
        }
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--overlay-dark); z-index:-1; }
        
        header { background: var(--primary-red); height:60px; display:flex; justify-content:space-between; align-items:center; padding:0 30px; box-shadow:0 4px 15px rgba(0,0,0,0.5); z-index: 10; position: relative; }
        
        .container { display:flex; height: calc(100vh - 60px); }
        
        aside { 
            width:260px; background: rgba(0, 0, 0, 0.5); 
            backdrop-filter: blur(15px); padding:20px; 
            display:flex; flex-direction:column; border-right:1px solid rgba(255,255,255,0.1); 
        }

        .nav-btn { 
            background: var(--primary-red); color:white; border:none; padding:14px; 
            border-radius:6px; font-weight:600; cursor:pointer; transition: 0.3s; 
            text-align:center; margin-bottom: 10px; text-decoration: none;
        }
        .nav-btn:hover { transform: translateX(5px); filter: brightness(1.2); }

        main { flex:1; padding:40px; overflow-y:auto; display: flex; flex-direction: column; align-items: center; }

        /* GRELHA DE TRANSCRIPTS */
        .logs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            margin-top: 20px;
        }

        .log-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 5px solid var(--primary-red);
            padding: 20px;
            border-radius: 10px;
            text-align: left;
            transition: 0.3s;
        }

        .log-card:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.1); }

        .btn-open {
            display: block; margin-top: 15px; background: white; color: black;
            text-align: center; padding: 8px; border-radius: 5px;
            font-weight: 800; text-decoration: none; font-size: 0.8rem;
        }
        .btn-open:hover { background: var(--primary-red); color: white; }

        h1 { font-size:2.2rem; font-weight:800; text-shadow:2px 2px 8px rgba(0,0,0,0.8); }
    </style>
</head>
<body>

    <div class="bg-full"></div>
    <div class="overlay"></div>

    <header>
        <span style="font-weight: 800; font-size: 1.2rem;">Jordan Shop Site</span>
        <div class="user-tag" style="display:flex; align-items:center; gap:10px;">
            Olá, <span id="nav-username">...</span>
        </div>
    </header>

    <div class="container">
        <aside>
            <div class="nav-links">
                <button class="nav-btn" onclick="window.location.href='loja.html'">INÍCIO</button>
                <button class="nav-btn" style="background: #555;">TRANSCRIPTS</button>
                <button class="nav-btn" onclick="window.location.href='loja.html?sec=vendas'">VENDAS</button>
                <button class="nav-btn" onclick="window.location.href='loja.html?sec=embed'">CRIAR EMBED</button>
            </div>
            <a href="login.html" class="nav-btn" style="background: #b30000; margin-top: auto;" onclick="sessionStorage.clear()">SAIR 🚪</a>
        </aside>

        <main>
            <h1>📄 Histórico de Transcripts</h1>
            <div class="logs-grid" id="logs-list">
                <p>A procurar registos no sistema...</p>
            </div>
        </main>
    </div>

    <script>
        async function fetchLogs() {
            const grid = document.getElementById('logs-list');
            try {
                const response = await fetch('/api/list-transcripts');
                const logs = await response.json();
                grid.innerHTML = '';

                if (!logs || logs.length === 0) {
                    grid.innerHTML = "<p>Nenhum ticket encontrado.</p>";
                    return;
                }

                logs.forEach(file => {
                    const card = document.createElement('div');
                    card.className = 'log-card';
                    let nomeLimpo = file.name.replace('.html', '').split('-')[1] || "Ticket";
                    const data = new Date(file.created_at).toLocaleString('pt-PT');

                    card.innerHTML = `
                        <strong>👤 CLIENTE: ${nomeLimpo.toUpperCase()}</strong>
                        <span style="display:block; margin-top:5px; font-size:0.8rem; color:#aaa;">Data: ${data}</span>
                        <a href="/transcripts/${file.name}" target="_blank" class="btn-open">ABRIR REGISTO</a>
                    `;
                    grid.appendChild(card);
                });
            } catch (e) {
                grid.innerHTML = "<p>❌ Erro ao ligar à API.</p>";
            }
        }
    </script>
</body>
</html>
