<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jordan Shop | Transcripts</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <script>
        const utilizadorLogado = sessionStorage.getItem('staff_sessao') || null;
        if (!utilizadorLogado) {
            alert("⚠️ Sessão Inválida!");
            window.location.href = "login.html";
        }
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('nav-username').innerText = utilizadorLogado;
            fetchLogs();
        });
    </script>

    <style>
        :root { --primary-red: #8b0000; --overlay-dark: rgba(0, 0, 0, 0.8); --transition-speed: 0.4s; }
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Open Sans', sans-serif; color: white; overflow: hidden; }

        .bg-full { position: fixed; top:0; left:0; width:100%; height:100%; background: url('menu.png') no-repeat center center; background-size: cover; z-index:-2; }
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--overlay-dark); z-index:-1; }

        header { background: var(--primary-red); height:60px; display:flex; justify-content:space-between; align-items:center; padding:0 30px; box-shadow:0 4px 15px rgba(0,0,0,0.5); z-index: 10; position: relative; }
        .logo-link { color: white; text-decoration: none; font-weight: 800; font-size: 1.3rem; cursor: pointer; }
        .user-tag { background: rgba(0,0,0,0.4); padding:8px 15px; border-radius:5px; font-weight:600; display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 25px; height: 25px; border-radius: 50%; border: 1px solid white; }

        .container { display:flex; height: calc(100vh - 60px); }

        aside { width:260px; background: rgba(40,40,40,0.6); backdrop-filter: blur(10px); padding:20px; display:flex; flex-direction:column; border-right:1px solid rgba(255,255,255,0.1); }
        .search-box { width:100%; padding:12px; border-radius:5px; border:none; background: rgba(255,255,255,0.1); color:white; outline:none; border-bottom:2px solid transparent; transition:0.3s; margin-bottom: 20px; }
        .search-box:focus { border-bottom:2px solid var(--primary-red); }
        .nav-links { display: flex; flex-direction: column; gap: 12px; flex-grow: 1; }
        .nav-btn { background: var(--primary-red); color:white; border:none; padding:14px; border-radius:6px; font-weight:600; cursor:pointer; transition: var(--transition-speed); text-align:center; text-decoration:none; display: block; }
        .nav-btn:hover { transform: translateX(10px); filter: brightness(1.3); }
        .nav-btn.active { background: #ff0000; box-shadow: 0 0 15px rgba(255,0,0,0.4); }
        .logout-btn { background: #b30000; color: white; padding: 12px; border-radius: 6px; text-decoration: none; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; margin-top: auto; border: none; cursor: pointer; }
        .logout-btn:hover { background: #ff0000; transform: scale(1.02); }

        main { flex:1; padding:40px; overflow-y:auto; display: flex; flex-direction: column; align-items: center; }
        h1 { font-size:2.2rem; font-weight:800; text-shadow:2px 2px 8px rgba(0,0,0,0.8); margin-bottom: 10px; }

        /* GRELHA DE TRANSCRIPTS */
        .logs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; width: 100%; max-width: 1200px; margin-top: 20px; }

        .log-card {
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            border-left: 5px solid var(--primary-red);
            padding: 20px;
            border-radius: 12px;
            text-align: left;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .log-card:hover { transform: translateY(-5px); border-left-color: #ff0000; box-shadow: 0 8px 25px rgba(139,0,0,0.3); }

        .log-card strong { display: block; font-size: 1rem; color: #fff; margin-bottom: 5px; }
        .log-card .data { color: #aaa; font-size: 0.8rem; margin-bottom: 5px; }
        .log-card .canal { color: #888; font-size: 0.75rem; font-style: italic; }

        .btn-open {
            display: block; margin-top: 15px; background: var(--primary-red); color: white;
            text-align: center; padding: 10px; border-radius: 6px;
            font-weight: 800; text-decoration: none; font-size: 0.85rem;
            transition: 0.3s;
        }
        .btn-open:hover { background: #ff0000; box-shadow: 0 0 15px rgba(255,0,0,0.4); }

        .loading { color: #aaa; font-style: italic; }
        .sem-resultados { color: #aaa; text-align: center; padding: 40px; }
    </style>
</head>
<body>
    <div class="bg-full"></div>
    <div class="overlay"></div>

    <header>
        <a href="loja.html" class="logo-link">Jordan Shop Site</a>
        <div class="user-tag">
            <img src="logo.png" class="user-avatar">
            Olá, <span id="nav-username">Staff</span>
        </div>
    </header>

    <div class="container">
        <aside>
            <input type="text" class="search-box" placeholder="Procurar função..." onkeyup="filtrarMenu(this)">
            <div class="nav-links">
                <a href="loja.html" class="nav-btn">INÍCIO</a>
                <a href="transcripts.html" class="nav-btn active">TRANSCRIPTS</a>
                <a href="loja.html#vendas-section" class="nav-btn" onclick="irPara('vendas-section')">VENDAS</a>
                <a href="loja.html#embed-section" class="nav-btn" onclick="irPara('embed-section')">CRIAR EMBED</a>
                <a href="loja.html#bot-status-section" class="nav-btn" onclick="irPara('bot-status-section')">SITE ONLINE</a>
            </div>
            <button class="logout-btn" onclick="sessionStorage.clear(); window.location.href='login.html'">
                SAIR 🚪
            </button>
        </aside>

        <main>
            <h1>📄 Histórico de Transcripts</h1>
