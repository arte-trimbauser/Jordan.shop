<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jordan Shop | Painel Staff</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script>
        const params = new URLSearchParams(window.location.search);
        const userNoLink = params.get('user');

        if (userNoLink) {
            sessionStorage.setItem('staff_sessao', userNoLink);
            window.history.replaceState({}, document.title, "loja.html");
        } 

        if (!sessionStorage.getItem('staff_sessao')) {
            alert("⚠️ Sessão Inválida! Faz login novamente.");
            window.location.href = "login.html";
        }

        const utilizadorLogado = sessionStorage.getItem('staff_sessao');

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('nav-username').innerText = utilizadorLogado;
            document.getElementById('main-welcome').innerText = "Bem-Vindo, " + utilizadorLogado;
            
            setTimeout(() => {
                const splash = document.getElementById('welcome-screen');
                splash.style.opacity = '0';
                setTimeout(() => splash.style.display = 'none', 800);
            }, 1500);
        });
    </script>

    <style>
:root {
    /* Este tom #8b0000 é o vermelho escuro clássico que aparece no teu header */
    --primary-red: #8b0000; 
    --overlay-dark: rgba(0, 0, 0, 0.85); /* Mantém o fundo escuro para realçar a imagem */
}
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Open Sans', sans-serif; color: white; overflow: hidden; }
        
.bg-full {
    background: url('teu-fundo-personalizado.png') no-repeat center center;
    background-size: cover;
    filter: brightness(0.4); /* Ajusta isto para a imagem não ficar demasiado clara e tapar o texto */
}        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--overlay-dark); z-index:-1; }
        
        #welcome-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: #000; display:flex; justify-content:center; align-items:center; z-index:9999; transition: opacity 0.8s ease; }
        
        header { background: var(--primary-red); height:60px; display:flex; justify-content:space-between; align-items:center; padding:0 30px; box-shadow:0 4px 15px rgba(0,0,0,0.5); z-index: 10; position: relative; }
        .logo-link { color: white; text-decoration: none; font-weight: 800; font-size: 1.3rem; }
        .user-tag { background: rgba(0,0,0,0.4); padding:8px 15px; border-radius:5px; font-weight:600; display: flex; align-items: center; gap: 10px; }

        .container { display:flex; height: calc(100vh - 60px); }
        
        aside { width:260px; background: rgba(40,40,40,0.6); backdrop-filter: blur(15px); padding:20px; display:flex; flex-direction:column; border-right:1px solid rgba(255,255,255,0.1); }
        .nav-links { display: flex; flex-direction: column; gap: 12px; flex-grow: 1; }
        
        .search-box { width:100%; padding:12px; border-radius:5px; border:none; background: rgba(255,255,255,0.1); color:white; outline:none; border-bottom:2px solid transparent; transition:0.3s; margin-bottom: 20px; }
        .search-box:focus { border-bottom:2px solid var(--primary-red); }

        .nav-btn { background: var(--primary-red); color:white; border:none; padding:14px; border-radius:6px; font-weight:600; cursor:pointer; transition: var(--transition-speed); text-align:center; }
.nav-btn:hover {
    background: #a30000; /* Um vermelho ligeiramente mais claro para o efeito de clique */
    box-shadow: 0 0 15px rgba(139, 0, 0, 0.4);
    transform: translateX(5px);
}
        .logout-btn { background: #b30000; color: white; padding: 12px; border-radius: 6px; text-decoration: none; font-weight: bold; text-align: center; margin-top: auto; transition: 0.3s; }
        .logout-btn:hover { background: #ff0000; }

        main { flex:1; padding:40px; overflow-y:auto; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .content-div { width: 100%; max-width: 850px; display: none; animation: fadeIn 0.4s ease; }
        
        h1 { font-size:2.5rem; font-weight:800; text-shadow:2px 2px 8px rgba(0,0,0,0.8); margin-bottom: 30px; }

        /* Estilo das Vendas */
.log-item {
    background: rgba(20, 20, 20, 0.8); /* O 0.8 dá a transparência necessária */
    backdrop-filter: blur(5px); /* Dá aquele efeito de vidro fosc */
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-left: 5px solid var(--primary-red); /* Mantém a linha vermelha à esquerda */
}
        .log-item:hover { border-color: var(--primary-red); transform: scale(1.01); }
        .log-info strong { display: block; font-size: 1rem; color: #fff; }
        .log-info span { color: #bbb; font-size: 0.85rem; }
        .status-badge { padding: 5px 10px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; background: #00ff00; color: #000; min-width: 80px; text-align: center; }

        /* Estilo do Criador de Embed */
        .embed-card { background: rgba(20, 20, 20, 0.95); padding: 30px; border-radius: 15px; border-top: 5px solid var(--primary-red); text-align: left; }
        .form-label { display: block; color: #bbb; margin-bottom: 8px; font-weight: bold; font-size: 0.9rem; }
        .embed-input { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid #444; border-radius: 6px; color: white; margin-bottom: 20px; outline: none; }
        .embed-input:focus { border-color: var(--primary-red); }

        .status-card { background: rgba(20, 20, 20, 0.95); padding: 30px; border-radius: 15px; border-left: 8px solid #00ff00; text-align: left; width: 100%; max-width: 500px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <h2 style="font-size: 2.5rem;">Jordan Shop | Painel Staff</h2>
    </div>

    <div class="bg-full"></div>
    <div class="overlay"></div>

    <header>
        <a href="javascript:location.reload()" class="logo-link">Jordan Shop | 🔃 Atualizar</a>
        <div class="user-tag">
            <img src="logo.png" style="width:25px; border-radius:50%;" alt="User">
            Olá, <span id="nav-username">Staff</span>
        </div>
    </header>

    <div class="container">
        <aside>
            <input type="text" id="search" class="search-box" placeholder="Procurar função..." onkeyup="filtrarMenu()">
            <div class="nav-links">
                <button class="nav-btn" onclick="showSection('welcome-section')">INÍCIO</button>
                <button class="nav-btn" onclick="window.location.href='https://jordan-shop.onrender.com/transcripts.html'">TRANSCRIPTS</button>
                <button class="nav-btn" onclick="showSection('vendas-section')">VENDAS</button>
                <button class="nav-btn" onclick="showSection('embed-section')">CRIAR EMBED</button>
                <button class="nav-btn" onclick="showSection('bot-status-section')">SITE ONLINE</button>
            </div>
            <a href="login.html" class="logout-btn" onclick="sessionStorage.clear()">SAIR 🚪</a>
        </aside>

        <main>
            <div id="welcome-section" class="content-div" style="display:block;">
                <h1 id="main-welcome">Bem-Vindo</h1>
                <p style="font-size: 1.2rem; opacity: 0.8;">Painel de Administração e Gestão da Jordan Shop</p>
            </div>

        <main>
            <h1>📄 Histórico de Transcripts</h1>
            <div class="logs-grid" id="logs-list">
                <p>A procurar registos no sistema...</p>
            </div>
        </main>
    </div>

    <script>
        document.getElementById('nav-username').innerText = utilizadorLogado;

        async function fetchLogs() {
            const grid = document.getElementById('logs-list');
            grid.innerHTML = '<p style="color:#888;">A carregar base de dados...</p>';
            
            try {
                const response = await fetch('/api/list-transcripts');
                const logs = await response.json();
                
                grid.innerHTML = '';

                if (!logs || logs.length === 0) {
                    grid.innerHTML = "<p>Nenhum ticket arquivado encontrado.</p>";
                    return;
                }

                logs.forEach(file => {
                    const card = document.createElement('div');
                    card.className = 'log-card';
                    
                    // Extrai o nome do utilizador do nome do ficheiro (ex: ticket-nome-id)
                    // Se o nome for apenas o ID, mostra "Ticket Antigo"
                    let nomeLimpo = file.name.replace('.html', '').split('-')[1] || "ID: " + file.name.split('.')[0];
                    const dataFormatada = new Date(file.created_at).toLocaleString('pt-PT');

                    card.innerHTML = `
                        <strong>👤 CLIENTE: ${nomeLimpo.toUpperCase()}</strong>
                        <span>Registado em: ${dataFormatada}</span>
                        <a href="/transcripts/${file.name.replace('.html', '')}" target="_blank" class="btn-open">ABRIR REGISTO</a>
                    `;
                    grid.appendChild(card);
                });

            } catch (e) {
                console.error("Erro:", e);
                grid.innerHTML = "<p>❌ Erro de ligação ao servidor.</p>";
            }
        }

        fetchLogs();
    </script>
</body>
</html>
