<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jordan Shop | Transcripts</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <script>
        const utilizadorLogado = sessionStorage.getItem('staff_sessao') || null;
        if (!utilizadorLogado) {
            alert("⚠️ Sessão Inválida!");
            window.location.href = "login.html";
        }
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('nav-username').innerText = utilizadorLogado;
            fetchLogs();
        });
    </script>

    <style>
        :root { --primary-red: #8b0000; --overlay-dark: rgba(0,0,0,0.85); --transition-speed: 0.4s; }
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Open Sans', sans-serif; color: white; overflow: hidden; }

        .bg-full { position: fixed; top:0; left:0; width:100%; height:100%; background: url('menu.png') no-repeat center center; background-size: cover; z-index:-2; }
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--overlay-dark); z-index:-1; }

        /* HEADER - IDÊNTICO AO LOJA.HTML */
        header { 
            background: var(--primary-red); 
            height:60px; 
            display:flex; 
            justify-content:space-between; 
            align-items:center; 
            padding:0 30px; 
            box-shadow:0 4px 15px rgba(0,0,0,0.5); 
            z-index:10; 
            position:relative; 
        }
        .logo-link { 
            color:white; 
            text-decoration:none; 
            font-weight:800; 
            font-size:1.3rem; 
            cursor:pointer; 
            transition: all 0.3s ease;
        }
        .logo-link:hover {
            transform: scale(1.05);
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        /* BOTÃO ATUALIZAR NO HEADER - IGUAL AO LOJA */
        .refresh-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .refresh-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .refresh-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        .refresh-btn.spinning {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .user-tag { 
            background:rgba(0,0,0,0.4); 
            padding:8px 15px; 
            border-radius:5px; 
            font-weight:600; 
            display:flex; 
            align-items:center; 
            gap:10px; 
        }
        .user-avatar { width:25px; height:25px; border-radius:50%; border:1px solid white; }

        /* CONTAINER - LAYOUT HORIZONTAL (flex row) */
        .container { 
            display:flex; 
            flex-direction: row; /* HORIZONTAL: sidebar à esquerda, main à direita */
            height:calc(100vh - 60px); 
        }

        /* SIDEBAR - IDÊNTICA */
        aside { 
            width:260px; /* MESMA LARGURA QUE LOJA.HTML */
            background:rgba(0,0,0,0.5); 
            backdrop-filter:blur(15px); 
            padding:20px; 
            display:flex; 
            flex-direction:column; 
            border-right:1px solid rgba(255,255,255,0.1); 
        }
        .search-box { 
            width:100%; 
            padding:12px; 
            border-radius:5px; 
            border:none; 
            background:rgba(255,255,255,0.1); 
            color:white; 
            outline:none; 
            border-bottom:2px solid transparent; 
            transition:0.3s; 
            margin-bottom:20px; 
            font-size:0.9rem; 
        }
        .search-box:focus { border-bottom:2px solid var(--primary-red); }
        .search-box::placeholder { color: #888; }

        .nav-links { display:flex; flex-direction:column; gap:12px; flex-grow:1; }
        .nav-btn { 
            background:var(--primary-red); 
            color:white; 
            border:none; 
            padding:14px; 
            border-radius:6px; 
            font-weight:600; 
            cursor:pointer; 
            transition:var(--transition-speed); 
            text-align:center; 
            text-decoration:none; 
            display:block; 
            font-size:0.9rem; 
        }
        .nav-btn:hover { 
            transform:translateX(10px); 
            filter:brightness(1.3); 
        }
        .nav-btn.active { 
            background:#ff0000; 
            box-shadow:0 0 15px rgba(255,0,0,0.4); 
        }
        .logout-btn { 
            background:#b30000; 
            color:white; 
            padding:12px; 
            border-radius:6px; 
            text-decoration:none; 
            font-weight:bold; 
            display:flex; 
            align-items:center; 
            justify-content:center; 
            gap:10px; 
            transition:0.3s; 
            margin-top:auto; 
            border:none; 
            cursor:pointer; 
            font-size:0.9rem; 
        }
        .logout-btn:hover { 
            background:#ff0000; 
            transform:scale(1.02); 
        }

        /* MAIN */
        main { 
            flex:1; 
            padding:40px; 
            overflow-y:auto; 
            display:flex; 
            flex-direction:column; 
            align-items:center; 
        }
        h1 { 
            font-size:2rem; 
            font-weight:800; 
            text-shadow:2px 2px 8px rgba(0,0,0,0.8); 
            margin-bottom:5px; 
        }
        .subtitulo { 
            color:#aaa; 
            font-size:0.9rem; 
            margin-bottom:20px; 
        }

        /* Barra de pesquisa */
        .search-transcripts { 
            width:100%; 
            max-width:900px; 
            padding:12px 15px; 
            border-radius:8px; 
            border:none; 
            background:rgba(255,255,255,0.08); 
            color:white; 
            outline:none; 
            border:1px solid rgba(255,255,255,0.1); 
            font-size:0.95rem; 
            margin-bottom:20px; 
            transition:0.3s; 
        }
        .search-transcripts:focus { 
            border-color:var(--primary-red); 
            background:rgba(255,255,255,0.12); 
        }
        .search-transcripts::placeholder { color:#666; }

        /* Lista de transcripts */
        .transcripts-lista { 
            width:100%; 
            max-width:900px; 
            display:flex; 
            flex-direction:column; 
            gap:10px; 
        }

        .transcript-item { 
            background:rgba(20,20,20,0.92); 
            border:1px solid rgba(255,255,255,0.08); 
            border-left:5px solid var(--primary-red); 
            border-radius:10px; 
            overflow:hidden; 
            transition:0.3s; 
            animation: fadeIn 0.3s ease;
        }
        .transcript-item:hover { 
            border-left-color:#ff0000; 
            box-shadow:0 4px 20px rgba(139,0,0,0.3); 
        }

        .transcript-header { 
            display:flex; 
            justify-content:space-between; 
            align-items:center; 
            padding:15px 20px; 
            cursor:pointer; 
            gap:10px; 
        }
        .transcript-header:hover { 
            background:rgba(255,255,255,0.03); 
        }

        .transcript-info { flex:1; }
        .transcript-nome { 
            font-weight:700; 
            font-size:0.95rem; 
            color:#fff; 
        }
        .transcript-meta { 
            font-size:0.78rem; 
            color:#888; 
            margin-top:3px; 
        }

        .transcript-btns { 
            display:flex; 
            gap:8px; 
            align-items:center; 
            flex-shrink:0; 
        }
        .btn-html { 
            background:var(--primary-red); 
            color:white; 
            border:none; 
            padding:7px 14px; 
            border-radius:5px; 
            font-weight:700; 
            font-size:0.78rem; 
            cursor:pointer; 
            text-decoration:none; 
            transition:0.3s; 
        }
        .btn-html:hover { 
            background:#ff0000; 
            box-shadow: 0 0 10px rgba(255,0,0,0.4);
        }
        .btn-expandir { 
            background:rgba(255,255,255,0.1); 
            color:white; 
            border:none; 
            padding:7px 12px; 
            border-radius:5px; 
            font-weight:700; 
            font-size:0.85rem; 
            cursor:pointer; 
            transition:0.3s; 
        }
        .btn-expandir:hover { 
            background:rgba(255,255,255,0.2); 
        }
        .btn-expandir.aberto { 
            transform:rotate(180deg); 
        }

        /* Área expandida com iframe - CORRIGIDO */
        .transcript-preview { 
            display:none; 
            border-top:1px solid rgba(255,255,255,0.08); 
            background:#1a1a1a;
            min-height: 100px;
        }
        .transcript-preview.aberto { 
            display:block; 
        }
        .transcript-preview iframe { 
            width:100%; 
            height:400px; 
            border:none; 
            display:block; 
            background: white;
        }
        .preview-loading { 
            padding:30px; 
            text-align:center; 
            color:#aaa; 
            font-size:0.9rem; 
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .preview-loading::before {
            content: "⏳";
            font-size: 2rem;
            animation: pulse 1.5s infinite;
        }
        .preview-error {
            padding: 30px;
            text-align: center;
            color: #ff6666;
            font-size: 0.9rem;
        }

        /* Estado vazio */
        .sem-resultados { 
            color:#666; 
            text-align:center; 
            padding:60px 20px; 
            font-size:1rem; 
        }

        @keyframes fadeIn { 
            from{opacity:0;transform:translateY(-8px);} 
            to{opacity:1;transform:translateY(0);} 
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.1); }
        }

        /* RESPONSIVIDADE - MANTÉM HORIZONTAL EM DESKTOP, VERTICAL EM MOBILE */
        @media (max-width: 768px) {
            header { height: 50px; padding: 0 15px; }
            .logo-link { font-size: 1rem; }
            .user-tag { padding: 5px 10px; font-size: 0.85rem; }
            .user-avatar { width: 20px; height: 20px; }
            .refresh-btn { padding: 6px 12px; font-size: 0.8rem; }

            /* EM MOBILE: MUDA PARA VERTICAL */
            .container { 
                flex-direction: column; 
                height: calc(100vh - 50px); 
            }

            aside { 
                width: 100%; 
                height: auto; 
                padding: 10px; 
                flex-direction: row; 
                flex-wrap: wrap;
                border-right: none; 
                border-bottom: 1px solid rgba(255,255,255,0.1);
            }
            .search-box { 
                width: 100%; 
                margin-bottom: 10px; 
                padding: 8px;
                font-size: 0.8rem;
            }
            .nav-links { 
                flex-direction: row; 
                gap: 5px; 
                flex-grow: 1;
                overflow-x: auto;
            }
            .nav-btn { 
                padding: 8px 12px; 
                font-size: 0.75rem; 
                white-space: nowrap;
                min-width: fit-content;
            }
            .nav-btn:hover { transform: translateY(-2px); }
            .logout-btn { 
                padding: 8px 12px; 
                font-size: 0.75rem; 
                margin-top: 0;
                margin-left: auto;
            }

            main { padding: 15px; }
            h1 { font-size: 1.5rem; }
            .subtitulo { font-size: 0.8rem; margin-bottom: 15px; }
            .search-transcripts { padding: 10px; font-size: 0.9rem; margin-bottom: 15px; }

            .transcript-header { padding: 12px 15px; }
            .transcript-nome { font-size: 0.85rem; }
            .transcript-meta { font-size: 0.7rem; }
            .btn-html { padding: 6px 10px; font-size: 0.7rem; }
            .btn-expandir { padding: 6px 10px; font-size: 0.75rem; }
            .transcript-preview iframe { height: 300px; }
        }

        @media (max-width: 480px) {
            .logo-link { font-size: 0.9rem; }
            .user-tag { font-size: 0.75rem; padding: 4px 8px; }
            .nav-links { gap: 3px; }
            .nav-btn { padding: 6px 8px; font-size: 0.7rem; }
            .logout-btn { padding: 6px 8px; font-size: 0.7rem; }
            h1 { font-size: 1.3rem; }
            .transcript-header { flex-direction: column; align-items: flex-start; gap: 8px; }
            .transcript-btns { width: 100%; justify-content: flex-end; }
            .transcript-preview iframe { height: 250px; }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="bg-full"></div>
    <div class="overlay"></div>

    <header>
        <a href="loja.html" class="logo-link">Jordan Shop | Atualizar</a>
        <div class="refresh-container">
            <button class="refresh-btn" onclick="atualizarPagina()" title="Atualizar página">
                <span id="refreshIcon">🔃</span> Atualizar
            </button>
            <div class="user-tag">
                <img src="logo.png" class="user-avatar" alt="Logo">
                Olá, <span id="nav-username">Staff</span>
            </div>
        </div>
    </header>

    <!-- LAYOUT HORIZONTAL: Sidebar à esquerda, Main à direita -->
    <div class="container">
        <aside>
            <input type="text" class="search-box" placeholder="Procurar função..." onkeyup="filtrarMenu(this)">
            <div class="nav-links">
                <a href="loja.html" class="nav-btn" onclick="irPara('welcome-section')">INÍCIO</a>
                <a href="transcripts.html" class="nav-btn active">TRANSCRIPTS</a>
                <a href="loja.html" class="nav-btn" onclick="irPara('vendas-section')">VENDAS</a>
                <a href="loja.html" class="nav-btn" onclick="irPara('embed-section')">CRIAR EMBED</a>
                <a href="loja.html" class="nav-btn" onclick="irPara('bot-status-section')">SITE ONLINE</a>
            </div>
            <button class="logout-btn" onclick="sessionStorage.clear(); window.location.href='login.html'">
                SAIR 🚪
            </button>
        </aside>

        <main>
            <h1>📄 Histórico de Transcripts</h1>
            <p class="subtitulo" id="subtitulo">A carregar...</p>

            <input type="text" class="search-transcripts" placeholder="🔍 Pesquisar por nome ou produto..." oninput="pesquisarTranscripts(this.value)">

            <div class="transcripts-lista" id="lista">
                <div class="sem-resultados">A procurar registos...</div>
            </div>

            <!-- REMOVIDO: Link no final para voltar à loja -->
        </main>
    </div>

    <script>
        let todosTranscripts = [];
        const transcriptsCarregados = {};

        function filtrarMenu(input) {
            const valor = input.value.toLowerCase();
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.style.display = btn.innerText.toLowerCase().includes(valor) ? 'block' : 'none';
            });
        }

        function irPara(secao) {
            sessionStorage.setItem('ir_para_secao', secao);
        }

        function pesquisarTranscripts(valor) {
            const filtrados = todosTranscripts.filter(f =>
                f.name.toLowerCase().includes(valor.toLowerCase())
            );
            renderTranscripts(filtrados);
        }

        function atualizarPagina() {
            const btn = document.querySelector('.refresh-btn');
            const icon = document.getElementById('refreshIcon');

            btn.classList.add('spinning');
            btn.disabled = true;

            fetchLogs();

            setTimeout(() => {
                btn.classList.remove('spinning');
                btn.disabled = false;
            }, 1000);
        }

        function togglePreview(id, nome) {
            const preview = document.getElementById(`preview-${id}`);
            const btn = document.getElementById(`btn-exp-${id}`);
            const aberto = preview.classList.contains('aberto');

            if (aberto) {
                preview.classList.remove('aberto');
                btn.classList.remove('aberto');
                btn.innerText = '▼';
            } else {
                preview.classList.add('aberto');
                btn.classList.add('aberto');
                btn.innerText = '▲';

                const transcriptId = nome.replace('.html', '');

                if (!transcriptsCarregados[transcriptId]) {
                    preview.innerHTML = '<div class="preview-loading">A carregar transcript...</div>';

                    const iframe = document.createElement('iframe');
                    iframe.style.width = '100%';
                    iframe.style.height = '400px';
                    iframe.style.border = 'none';
                    iframe.style.background = 'white';

                    const timeout = setTimeout(() => {
                        if (!transcriptsCarregados[transcriptId]) {
                            preview.innerHTML = `
                                <div class="preview-error">
                                    ❌ Erro ao carregar transcript.<br>
                                    <small>O arquivo pode não existir ou o servidor está offline.</small><br><br>
                                    <a href="/transcripts/${transcriptId}" target="_blank" class="btn-html">Tentar abrir em nova aba</a>
                                </div>
                            `;
                        }
                    }, 5000);

                    iframe.onload = () => {
                        clearTimeout(timeout);
                        transcriptsCarregados[transcriptId] = true;
                        preview.innerHTML = '';
                        preview.appendChild(iframe);
                    };

                    iframe.onerror = () => {
                        clearTimeout(timeout);
                        preview.innerHTML = '<div class="preview-error">❌ Erro ao carregar.</div>';
                    };

                    iframe.src = `/transcripts/${transcriptId}?t=${Date.now()}`;
                }
            }
        }

        function renderTranscripts(lista) {
            const container = document.getElementById('lista');

            if (!lista || lista.length === 0) {
                container.innerHTML = "<p class='sem-resultados'>📭 Nenhum transcript encontrado.</p>";
                return;
            }

            container.innerHTML = '';
            lista.forEach((file, index) => {
                const nomeCompleto = file.name.replace('.html', '');
                const partes = nomeCompleto.split('-');
                const cliente = partes[partes.length - 1]?.toUpperCase() || 'CLIENTE';
                const produto = partes.slice(1, partes.length - 1).join(' ') || 'Produto';
                const data = file.created_at ? new Date(file.created_at).toLocaleString('pt-PT') : 'Data desconhecida';
                const id = `transcript-${index}`;

                const item = document.createElement('div');
                item.className = 'transcript-item';
                item.innerHTML = `
                    <div class="transcript-header" onclick="togglePreview('${id}', '${file.name}')">
                        <div class="transcript-info">
                            <div class="transcript-nome">👤 ${cliente} — ${produto}</div>
                            <div class="transcript-meta">🕒 ${data}</div>
                        </div>
                        <div class="transcript-btns">
                            <a href="/transcripts/${nomeCompleto}" target="_blank" class="btn-html" onclick="event.stopPropagation()">
                                🔗 ABRIR
                            </a>
                            <button class="btn-expandir" id="btn-exp-${id}">▼</button>
                        </div>
                    </div>
                    <div class="transcript-preview" id="preview-${id}"></div>
                `;
                container.appendChild(item);
            });
        }

        async function fetchLogs() {
            const subtitulo = document.getElementById('subtitulo');
            try {
                const response = await fetch('/api/list-transcripts');
                if (!response.ok) throw new Error('Erro na resposta');
                const logs = await response.json();
                todosTranscripts = logs;
                subtitulo.innerText = `${logs.length} transcript(s) encontrado(s)`;
                renderTranscripts(logs);
            } catch (e) {
                console.error(e);
                subtitulo.innerText = 'Erro ao carregar';
                document.getElementById('lista').innerHTML = `
                    <div class="sem-resultados">
                        ❌ Erro ao ligar à API.<br>
                        <small>Verifica se o servidor está online.</small>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
