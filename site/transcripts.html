<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jordan Shop | Transcripts</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script>
        const utilizadorLogado = sessionStorage.getItem('staff_sessao');
        if (!utilizadorLogado) { window.location.href = "login.html"; }
    </script>

    <style>
        :root {
            --primary-red: #8b0000;
            --card-bg: rgba(25, 25, 25, 0.95);
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Open Sans', sans-serif; color: white; background: #000; }
        
        .bg-full { position: fixed; top:0; left:0; width:100%; height:100%; background: url('menu.png') no-repeat center center; background-size: cover; z-index:-2; }
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index:-1; }

        header { background: var(--primary-red); height:60px; display:flex; justify-content:space-between; align-items:center; padding:0 30px; position: sticky; top: 0; z-index: 100; }
        .user-tag { background: rgba(0,0,0,0.4); padding:8px 15px; border-radius:5px; display: flex; align-items: center; gap: 10px; }

        .container { display:flex; min-height: calc(100vh - 60px); }
        
        aside { width:260px; background: rgba(30,30,30,0.7); backdrop-filter: blur(10px); padding:20px; border-right:1px solid rgba(255,255,255,0.1); }
        .nav-btn { display: block; background: var(--primary-red); color:white; padding:14px; border-radius:6px; font-weight:600; text-decoration:none; text-align:center; margin-bottom: 15px; transition: 0.3s; border: none; width: 100%; cursor: pointer; }
        .nav-btn:hover { background: #ff0000; transform: scale(1.02); }

        main { flex:1; padding:40px; overflow-y:auto; }
        h1 { font-size: 2.5rem; margin-bottom: 30px; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }

        /* GRID DE CARDS - Aqui é onde a magia acontece */
        .logs-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; 
            width: 100%;
        }

        .log-card {
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .log-card::before {
            content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--primary-red);
        }

        .log-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-red);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .log-card strong { font-size: 1.1rem; color: #fff; margin-bottom: 8px; display: block; }
        .log-card span { color: #aaa; font-size: 0.85rem; margin-bottom: 20px; flex-grow: 1; }

        .btn-open {
            background: #fff;
            color: #000;
            text-align: center;
            padding: 10px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 800;
            font-size: 0.85rem;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-open:hover {
            background: var(--primary-red);
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="bg-full"></div>
    <div class="overlay"></div>

    <header>
        <a href="loja.html" style="color:white; text-decoration:none; font-weight:800;">JORDAN SHOP | STAFF</a>
        <div class="user-tag">
            Olá, <span id="nav-username">Staff</span>
        </div>
    </header>

    <div class="container">
        <aside>
            <a href="loja.html" class="nav-btn">VOLTAR AO MENU</a>
            <button class="nav-btn" onclick="fetchLogs()">ATUALIZAR LOGS</button>
        </aside>

        <main>
            <h1>📄 Transcripts de Tickets</h1>
            <div class="logs-grid" id="logs-list">
                <p>A procurar registos no sistema...</p>
            </div>
        </main>
    </div>

    <script>
        document.getElementById('nav-username').innerText = utilizadorLogado;

        async function fetchLogs() {
            const grid = document.getElementById('logs-list');
            const REPO = "arte-trimbauser/Jordan.Shop-Bot-Site";
            
            try {
                const response = await fetch(`https://api.github.com/repos/${REPO}/contents/transcripts`);
                const files = await response.json();
                
                grid.innerHTML = '';

                const logs = files.filter(f => f.name.endsWith('.html') && f.name !== ".gitkeep");

                if (logs.length === 0) {
                    grid.innerHTML = "<p>Nenhum ticket arquivado.</p>";
                    return;
                }

                logs.forEach(file => {
                    const card = document.createElement('div');
                    card.className = 'log-card';
                    
                    // Limpar o nome do ficheiro para não aparecer o .html
                    const nomeTicket = file.name.replace('.html', '').replace(/-/g, ' ');

                    card.innerHTML = `
                        <strong>Ticket: ${nomeTicket}</strong>
                        <span>Conversa gravada com sucesso no sistema da Jordan Shop.</span>
                        <a href="https://arte-trimbauser.github.io/Jordan.Shop-Bot-Site/transcripts/${file.name}" target="_blank" class="btn-open">ABRIR EM NOVO SEPARADOR</a>
                    `;
                    grid.appendChild(card);
                });

            } catch (e) {
                grid.innerHTML = "<p>❌ Erro ao ligar ao servidor de ficheiros.</p>";
            }
        }

        fetchLogs();
    </script>
</body>
</html>
