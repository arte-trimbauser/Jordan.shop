<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Jordan Shop | Transcripts</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Open Sans', sans-serif; background: #0b0b0b; color: white; padding: 40px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #8b0000; padding-bottom: 20px; margin-bottom: 30px; }
        .btn-voltar { background: #8b0000; color: white; text-decoration: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        .btn-voltar:hover { background: #ff0000; }
        
        .list-container { display: grid; gap: 15px; }
        .log-item { 
            background: #1a1a1a; padding: 20px; border-radius: 10px; 
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid #333; transition: 0.3s;
        }
        .log-item:hover { border-color: #8b0000; transform: translateX(10px); }
        .log-info span { color: #888; font-size: 0.8rem; display: block; }
        .btn-view { background: #fff; color: #000; padding: 8px 15px; border-radius: 5px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Logs de Transcripts</h1>
        <a href="loja.html" class="btn-voltar">← Voltar ao Painel</a>
    </div>

    <div class="list-container" id="logs-list">
        <p>A carregar logs do servidor...</p>
    </div>

    <script>
        async function fetchLogs() {
            const REPO = "arte-trimbauser/Jordan.Shop-Bot-Site";
            const response = await fetch(`https://api.github.com/repos/${REPO}/contents/transcripts`);
            const files = await response.json();
            
            const list = document.getElementById('logs-list');
            list.innerHTML = '';

            if (files.length === 0 || files.message === "Not Found") {
                list.innerHTML = "<p>Nenhum log encontrado.</p>";
                return;
            }

            files.forEach(file => {
                if (file.name.endsWith('.html') && file.name !== ".gitkeep") {
                    const item = document.createElement('div');
                    item.className = 'log-item';
                    item.innerHTML = `
                        <div class="log-info">
                            <strong>${file.name}</strong>
                            <span>Ticket fechado e guardado</span>
                        </div>
                        <a href="https://arte-trimbauser.github.io/Jordan.Shop-Bot-Site/transcripts/${file.name}" target="_blank" class="btn-view">Ver Log</a>
                    `;
                    list.appendChild(item);
                }
            });
        }

        fetchLogs();
    </script>
</body>
</html>
