<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Jordan Shop | Lista de Transcripts</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Open Sans', sans-serif; background: #1a1a1a; color: white; padding: 40px; }
        .header { border-bottom: 2px solid #8b0000; padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .card { background: #2a2a2a; padding: 20px; border-radius: 8px; border-left: 4px solid #8b0000; transition: 0.3s; text-decoration: none; color: white; display: block; }
        .card:hover { background: #333; transform: translateY(-5px); border-left-color: #ff4444; }
        .card h3 { margin: 0; font-size: 1rem; color: #ff4444; }
        .card p { margin: 5px 0 0; font-size: 0.8rem; opacity: 0.6; }
        .btn-back { background: #8b0000; color: white; text-decoration: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        .btn-back:hover { background: #ff4444; }
    </style>
</head>
<body>

    <div class="header">
        <h1>📄 Histórico de Tickets</h1>
        <a href="/loja.html" class="btn-back">Sair</a>
    </div>

    <div class="grid" id="lista-logs">
        <p id="loading">A procurar transcritos no sistema...</p>
    </div>

    <script>
        async function fetchLogs() {
            // Dados extraídos do teu link do GitHub
            const repo = "arte-trimbauser/Jordan.Shop-Bot-Site"; 
            const folder = "transcripts"; // Pasta onde o bot guarda os ficheiros
            const grid = document.getElementById('lista-logs');

            try {
                // Procurar os ficheiros na API do GitHub
                const response = await fetch(`https://api.github.com/repos/${repo}/contents/${folder}`);
                const files = await response.json();

                if (!Array.isArray(files) || files.length === 0) {
                    grid.innerHTML = "<p>Nenhum log encontrado na pasta /transcripts.</p>";
                    return;
                }

                document.getElementById('loading').remove();

                files.forEach(file => {
                    if (file.name.endsWith('.html')) {
                        const card = document.createElement('a');
                        card.className = 'card';
                        
                        // Link direto para o Render abrir o ficheiro
                        card.href = `https://discord-bott-jordan.onrender.com/transcripts/${file.name}`;
                        card.target = "_blank";
                        
                        card.innerHTML = `
                            <h3>${file.name.replace('.html', '').replace(/ticket-/g, 'Ticket: ').replace(/-/g, ' ')}</h3>
                            <p>Clique para visualizar a conversa completa</p>
                        `;
                        grid.appendChild(card);
                    }
                });
            } catch (err) {
                grid.innerHTML = "<p>Erro ao ligar ao GitHub. Verifica se a pasta 'transcripts' existe.</p>";
                console.error(err);
            }
        }

        fetchLogs();
    </script>
</body>
</html>
